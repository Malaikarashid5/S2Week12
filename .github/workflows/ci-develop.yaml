name: wf-ci-develop
on:
  pull_request:
    branches:
      -develop
    types:
       -opened
       -synchronize
jobs:
  linting-develop-job:
    runs-on: ubuntu-latest
    steps:
       -name: Clone repository
       uses: actions/checkout@v4       
       -name:  Lint html files 
       run: npx htmlhint "**/*.html"
       -name: Lint CSS files
       run: npx stylelint "**/*.css"